<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Directory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; padding: 2rem; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { margin-bottom: 1.5rem; color: #1a1a2e; }
    .controls { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .controls input, .controls select {
      padding: 0.6rem 1rem; border: 1px solid #ccc; border-radius: 8px;
      font-size: 0.95rem; background: white;
    }
    .controls input { flex: 1; min-width: 200px; }
    .stats { display: flex; gap: 2rem; margin-bottom: 1.5rem; color: #555; font-size: 0.9rem; }
    .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
    .user-card {
      background: white; border-radius: 12px; padding: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.2s;
    }
    .user-card:hover { transform: translateY(-2px); }
    .user-card h3 { color: #1a1a2e; margin-bottom: 0.5rem; }
    .user-card p { color: #666; font-size: 0.9rem; margin-bottom: 0.25rem; }
    .user-card .email { color: #4361ee; }
    .badge {
      display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px;
      font-size: 0.75rem; font-weight: 600; margin-top: 0.5rem;
    }
    .badge.active { background: #d4edda; color: #155724; }
    .badge.inactive { background: #f8d7da; color: #721c24; }
    .loading { text-align: center; padding: 3rem; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>User Directory</h1>

    <div class="controls">
      <input type="text" id="search" placeholder="Search by name or email...">
      <select id="statusFilter">
        <option value="all">All Users</option>
        <option value="active">Active Only</option>
        <option value="inactive">Inactive Only</option>
      </select>
    </div>

    <div class="stats" id="stats"></div>
    <div class="user-grid" id="userGrid"></div>
  </div>

  <script>
    // ============================================
    // This project demonstrates ALL JS concepts:
    // - Arrow functions, destructuring, spread
    // - map, filter, reduce
    // - async/await, template literals
    // - Modules pattern (IIFE simulation)
    // ============================================

    const App = (() => {
      // --- State ---
      let users = [];
      let searchTerm = "";
      let statusFilter = "all";

      // --- DOM refs ---
      const grid = document.getElementById("userGrid");
      const statsEl = document.getElementById("stats");
      const searchInput = document.getElementById("search");
      const statusSelect = document.getElementById("statusFilter");

      // --- Fetch users ---
      const fetchUsers = async () => {
        try {
          grid.innerHTML = `<div class="loading">Loading users...</div>`;
          const response = await fetch("https://jsonplaceholder.typicode.com/users");
          if (!response.ok) throw new Error("Failed to fetch");
          const data = await response.json();
          users = data.map((user, index) => ({
            ...user,
            id: user.id,
            isActive: index % 3 !== 0, // simulate active/inactive
          }));
          render();
        } catch (error) {
          grid.innerHTML = `<div class="loading">Error: ${error.message}</div>`;
        }
      };

      // --- Filter users (uses filter + includes) ---
      const getFilteredUsers = () => {
        return users.filter(user => {
          const name = user.name.toLowerCase();
          const email = user.email.toLowerCase();
          const search = searchTerm.toLowerCase();
          const matchesSearch = name.includes(search) || email.includes(search);
          const matchesStatus =
            statusFilter === "all" ||
            (statusFilter === "active" && user.isActive) ||
            (statusFilter === "inactive" && !user.isActive);
          return matchesSearch && matchesStatus;
        });
      };

      // --- Render (uses map, destructuring, template literals) ---
      const render = () => {
        const filtered = getFilteredUsers();

        // Stats using reduce
        const stats = filtered.reduce(
          (acc, user) => {
            acc.total++;
            if (user.isActive) acc.active++;
            return acc;
          },
          { total: 0, active: 0 }
        );

        statsEl.textContent = `Showing ${stats.total} users (${stats.active} active)`;

        if (filtered.length === 0) {
          grid.innerHTML = `<div class="loading">No users match your filters</div>`;
          return;
        }

        grid.innerHTML = filtered
          .map(({ name, email, phone, company, isActive }) => {
            const companyName = company?.name || "N/A";
            return `
              <div class="user-card">
                <h3>${name}</h3>
                <p class="email">${email}</p>
                <p>${phone}</p>
                <p>${companyName}</p>
                <span class="badge ${isActive ? "active" : "inactive"}">
                  ${isActive ? "Active" : "Inactive"}
                </span>
              </div>
            `;
          })
          .join("");
      };

      // --- Event listeners (arrow functions) ---
      searchInput.addEventListener("input", (e) => {
        searchTerm = e.target.value;
        render();
      });

      statusSelect.addEventListener("change", (e) => {
        statusFilter = e.target.value;
        render();
      });

      // --- Init ---
      return { init: fetchUsers };
    })();

    App.init();
  </script>
</body>
</html>
